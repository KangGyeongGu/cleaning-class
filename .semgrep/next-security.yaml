rules:
  # ─── XSS: dangerouslySetInnerHTML ──────────────────────────────
  - id: dangerous-innerhtml-user-data
    message: >
      dangerouslySetInnerHTML with potentially user-controlled data.
      Only use with server-generated or properly sanitized content.
    severity: ERROR
    languages: [typescript]
    pattern: |
      <$TAG dangerouslySetInnerHTML={{__html: $EXPR}} />
    paths:
      include:
        - /src/**/*.tsx
      exclude:
        - /src/app/layout.tsx  # Server component — CDN CSS + JSON-LD only, reviewed safe

  # ─── Open Redirect ─────────────────────────────────────────────
  - id: open-redirect-user-input
    message: >
      Redirect with user-controlled URL. Validate that the URL
      is a relative path starting with "/" and not "//".
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern-either:
          - pattern: redirect($REQ.searchParams.get(...))
          - pattern: redirect($REQ.query.$PARAM)
          - pattern: NextResponse.redirect(new URL($REQ.searchParams.get(...), ...))
      - pattern-not-inside: |
          ...
          const $SAFE = $URL.startsWith("/") && !$URL.startsWith("//") ? $URL : ...;
          ...
    paths:
      include:
        - /src/**/*.ts
        - /src/**/*.tsx

  # ─── Hardcoded Secrets ─────────────────────────────────────────
  - id: hardcoded-secret-in-source
    message: >
      Potential hardcoded secret detected in source code.
      Use environment variables instead.
    severity: ERROR
    languages: [typescript]
    # 문자열 리터럴 ellipsis("sk_live_...")는 실제 토큰을 못 잡으므로 regex 로 매칭한다.
    pattern-regex: '(sk_live_|sk_test_|rk_live_)[A-Za-z0-9]{16,}'
    paths:
      include:
        - /src/**/*.ts
        - /src/**/*.tsx

  # ─── Sensitive Env in Client ───────────────────────────────────
  - id: non-public-env-in-client
    message: >
      Non-NEXT_PUBLIC_ environment variable accessed in a client component.
      Only NEXT_PUBLIC_ prefixed vars are available in the browser.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern: process.env.$VAR
      - metavariable-regex:
          metavariable: $VAR
          regex: ^(?!NEXT_PUBLIC_|NODE_ENV).*$
      - pattern-inside: |
          "use client";
          ...
    paths:
      include:
        - /src/**/*.tsx

  # ─── Zod .url() Without Protocol Validation ───────────────────
  - id: zod-url-without-protocol-validation
    message: >
      z.string().url() accepts javascript: and data: URIs.
      Add .refine() to enforce http:// or https:// protocol,
      or use .startsWith('http') validation.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern: z.string().url(...)
      - pattern-not-inside: |
          z.string().url(...).refine(...)
    paths:
      include:
        - /src/shared/lib/schema/**/*.ts

  # email-template-unescaped 룰 제거: semgrep 의 템플릿 리터럴 HTML 매칭이
  # 명확한 위반에도 발화하지 않아(비기능) 거짓 보안을 줬다. 이메일 HTML 의
  # 사용자 데이터 이스케이프는 infra/mail.ts 의 escapeHtml 규율 + email-header-injection
  # 룰 + 코드 리뷰로 강제한다. (감사 2026-06-29)

  # ─── Header Injection ──────────────────────────────────────────
  - id: email-header-injection
    message: >
      User data in email subject/headers without sanitization.
      Use sanitizeHeader() to strip CR/LF characters.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern: "subject: `...${$DATA}...`"
      - pattern-not: "subject: `...${sanitizeHeader(...)}...`"
    paths:
      include:
        - /src/shared/lib/infra/mail.ts
